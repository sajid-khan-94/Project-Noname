services:
  customer-frontend:
    build:
      context: .
      dockerfile: apps/customer/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "4173:80"
    depends_on:
      - gateway

  admin-frontend:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "4174:80"
    depends_on:
      - gateway

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8082
      FINANCE_SERVICE_URL: http://finance-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - payment-service
      - finance-service

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      PORT: 8081
      DATA_DIR: /app/data
    volumes:
      - auth-data:/app/data
    ports:
      - "8081:8081"

  payment-service:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    environment:
      PORT: 8082
      DATA_DIR: /app/data
    volumes:
      - payment-data:/app/data
    ports:
      - "8082:8082"

  finance-service:
    build:
      context: .
      dockerfile: services/finance/Dockerfile
    environment:
      PORT: 8083
      DATA_DIR: /app/data
    volumes:
      - finance-data:/app/data
    ports:
      - "8083:8083"

volumes:
  auth-data:
  payment-data:
  finance-data:
