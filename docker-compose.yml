services:
  customer-frontend:
    build:
      context: .
      dockerfile: apps/customer/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "4173:80"
    depends_on:
      - gateway

  admin-frontend:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "4174:80"
    depends_on:
      - gateway

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8082
      FINANCE_SERVICE_URL: http://finance-service:8083
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      payment-service:
        condition: service_started
      finance-service:
        condition: service_started

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: bkfast
      POSTGRES_PASSWORD: bkfast
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bkfast -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: bkfast
      POSTGRES_PASSWORD: bkfast
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bkfast -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - payment-db-data:/var/lib/postgresql/data

  finance-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: bkfast
      POSTGRES_PASSWORD: bkfast
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bkfast -d finance_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - finance-db-data:/var/lib/postgresql/data

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      PORT: 8081
      DATABASE_URL: postgresql://bkfast:bkfast@auth-db:5432/auth_db
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8081:8081"

  payment-service:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    environment:
      PORT: 8082
      DATABASE_URL: postgresql://bkfast:bkfast@payment-db:5432/payment_db
    depends_on:
      payment-db:
        condition: service_healthy
    ports:
      - "8082:8082"

  finance-service:
    build:
      context: .
      dockerfile: services/finance/Dockerfile
    environment:
      PORT: 8083
      DATABASE_URL: postgresql://bkfast:bkfast@finance-db:5432/finance_db
    depends_on:
      finance-db:
        condition: service_healthy
    ports:
      - "8083:8083"

volumes:
  auth-db-data:
  payment-db-data:
  finance-db-data:
